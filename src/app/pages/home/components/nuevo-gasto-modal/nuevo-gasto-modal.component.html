<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="cancelar()">
        <ion-icon slot="icon-only" name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Agregar Gasto</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="form-card">

    <ion-item lines="full">
      <ion-label position="stacked">Descripción</ion-label>
      <ion-input
        [(ngModel)]="descripcion"
        placeholder="¿En qué gastaste?"
        maxlength="60">
      </ion-input>
    </ion-item>

    <ion-item lines="full">
      <ion-label position="stacked">Monto</ion-label>
      <ion-input
        type="number"
        [(ngModel)]="monto"
        placeholder="0.00"
        min="0">
      </ion-input>
    </ion-item>

    <ion-item lines="full">
      <ion-label position="stacked">Categoría</ion-label>
      <ion-select
        [(ngModel)]="categoriaId"
        placeholder="Seleccionar categoría"
        interface="popover">
        <ion-select-option *ngFor="let cat of categorias" [value]="cat.id">
          {{ cat.nombre }}
        </ion-select-option>
      </ion-select>
    </ion-item>

  <!-- Fecha y hora nativas — amigables en móvil -->
  <ion-item class="fecha-hora-row">
    <ion-item lines="full" class="fecha-item">
      <ion-label position="stacked">Fecha y Hora</ion-label>
      <ion-datetime-button mode="ios" datetime="datetime"></ion-datetime-button>
      <ion-modal [keepContentsMounted]="true">
        <ng-template>
          <ion-datetime id="datetime"></ion-datetime>
        </ng-template>
      </ion-modal>
    </ion-item>
  </ion-item>

</div>
  <ion-button expand="block" (click)="guardar()">
    <ion-icon slot="start" name="save-outline"></ion-icon>
    AGREGAR GASTO
  </ion-button>
</ion-content>
