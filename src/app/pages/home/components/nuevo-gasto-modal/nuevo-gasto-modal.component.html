<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="cancelar()">
        <ion-icon slot="icon-only" name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>{{ esEdicion ? "Editar Gasto" : "Agregar Gasto" }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card class="form-card">
    <ion-item lines="full">
      <ion-label position="stacked">Descripción</ion-label>
      <ion-input
        [(ngModel)]="descripcion"
        placeholder="¿En qué gastaste?"
        maxlength="60"
      >
      </ion-input>
    </ion-item>

    <ion-item lines="full">
      <ion-label position="stacked">Monto</ion-label>
      <ion-input type="number" [(ngModel)]="monto" placeholder="0.00" min="0">
      </ion-input>
    </ion-item>

    <ion-item lines="full">
      <ion-label position="stacked">Categoría</ion-label>
      <ion-select
        [(ngModel)]="categoriaId"
        placeholder="Seleccionar categoría"
        interface="popover"
      >
        <ion-select-option *ngFor="let cat of categorias" [value]="cat.id">
          {{ cat.nombre }}
        </ion-select-option>
      </ion-select>
    </ion-item>

    <!-- Fecha y hora nativas — amigables en móvil -->
    <ion-item class="fecha-hora-row">
      <ion-item lines="full" class="fecha-item">
        <ion-label position="stacked">Fecha y Hora</ion-label>
        <ion-datetime-button datetime="datetime"></ion-datetime-button>

        <ion-modal [keepContentsMounted]="true">
          <ng-template>
            <ion-datetime
              id="datetime"
              presentation="date-time"
              value="2023-11-02T01:22:00"
              [formatOptions]="{
        date: {
          weekday: 'short',
          month: 'long',
          day: '2-digit',
        },
        time: {
          hour: '2-digit',
          minute: '2-digit',
        },
      }"
            ></ion-datetime>
          </ng-template>
        </ion-modal>
      </ion-item>
    </ion-item>
  </ion-card>
  <ion-button expand="block" (click)="guardar()">
    <ion-icon slot="start" name="save-outline"></ion-icon>
    {{ esEdicion ? "GUARDAR CAMBIOS" : "AGREGAR GASTO" }}
  </ion-button>
</ion-content>
