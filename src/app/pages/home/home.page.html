<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Inicio</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- Banner bienvenida -->
  <ion-card class="welcome-card ion-text-center ion-padding ion-margin-bottom">
    <ion-icon name="wallet-outline" style="font-size: 48px; color: var(--ion-color-primary)"></ion-icon>
    <h2>¡Bienvenido!</h2>
    <p>Mantén el control de tus gastos de manera fácil y efectiva</p>
  </ion-card>

  <!-- Resumen rápido -->

  {{ saldoDisponible() | currency }}

      </strong>
    </div>

  <!-- Lista de gastos -->
  <ion-item class="section-header">
    <h3>Lista de Gastos</h3>
    <ion-button slot="end" (click)="abrirNuevoGasto()">
      <ion-icon name="add-outline"></ion-icon>
      Nuevo Gasto
    </ion-button>
  </ion-item>

  <ion-list>
<ion-item-sliding *ngFor="let gasto of gastosService.gastos()">
  <ion-item>
    <div slot="start" class="cat-dot"
      [style.background]="getCategoriaColor(gasto.categoriaId)">
    </div>
    <ion-label>
      <h2>{{ gasto.descripcion }}</h2>
      <p>{{ getCategoriaNombre(gasto.categoriaId) }} · {{ gasto.fecha | date:'dd/MM/yyyy' }} {{ gasto.hora }}</p>
    </ion-label>
    <ion-note slot="end" color="primary">
      {{ gasto.monto | currency }}
    </ion-note>
  </ion-item>

  <!-- Editar (izquierda) -->
  <ion-item-options side="start">
    <ion-item-option color="primary" (click)="editarGasto(gasto)">
      <ion-icon slot="icon-only" name="create-outline"></ion-icon>
    </ion-item-option>
  </ion-item-options>

  <!-- Eliminar (derecha) -->
  <ion-item-options side="end">
    <ion-item-option color="danger" (click)="eliminarGasto(gasto.id)">
      <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
    </ion-item-option>
  </ion-item-options>
</ion-item-sliding>
  </ion-list>

  <!-- FAB -->
  <!-- <ion-fab slot="fixed" vertical="bottom" horizontal="end">

</ion-content>
